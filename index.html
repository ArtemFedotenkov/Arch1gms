<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHI GAMES | Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #08080a;
            --yt-color: #FF0000;
            --tt-color: #00f2ea;
            --tw-color: #9146ff;
            --ds-color: #f3d024;
            --accent-blue: #0070ff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: var(--accent-blue);
            filter: blur(130px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
        }
        .top-glow { top: -100px; left: -50px; }
        .bottom-glow { bottom: -100px; right: -50px; }

        .container {
            width: 100%;
            max-width: 380px;
            padding: 60px 20px;
            text-align: center;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            margin-bottom: 15px;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 112, 255, 0.5);
        }

        .description {
            font-size: 0.95rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 45px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            display: flex;
            align-items: center;
            padding: 18px 25px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 22px;
            text-decoration: none;
            color: white;
            position: relative;
            transition: all 0.2s ease;
            animation: pulse-card 4s infinite ease-in-out;
        }

        /* Эффект нажатия */
        .card:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.08);
        }

        @keyframes pulse-card {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* Стилизация иконок и границ */
        .card i {
            font-size: 1.6rem;
            margin-right: 20px;
            width: 30px;
            text-align: center;
        }

        .youtube { border: 1px solid var(--yt-color); box-shadow: 0 0 15px rgba(255, 0, 0, 0.15); animation-delay: 0s; }
        .tiktok { border: 1px solid var(--tt-color); box-shadow: 0 0 15px rgba(0, 242, 234, 0.15); animation-delay: 1s; }
        .twitch { border: 1px solid var(--tw-color); box-shadow: 0 0 15px rgba(145, 70, 255, 0.15); animation-delay: 2s; }
        .donate { border: 1px solid var(--ds-color); box-shadow: 0 0 15px rgba(243, 208, 36, 0.15); animation-delay: 3s; }

        .card-info { text-align: left; }
        .card-title { font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 2px; }
        .card-subtitle { font-size: 0.8rem; opacity: 0.5; }

        footer {
            margin-top: 60px;
            font-size: 0.75rem;
            opacity: 0.4;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="bg-glow top-glow"></div>
    <div class="bg-glow bottom-glow"></div>

    <div class="container">
        <header>
            <h1>ARCHI GAMES</h1>
            <p class="description">
                Драсьте всем! 🎮 Здесь только игры! <br>Присоединяйся, исследуй новые миры и просто получай удовольствие! Мир вам! ✨✌️
            </p>
        </header>

        <div class="links-container">
            <a href="https://www.youtube.com/@ARCH1GMS" class="card youtube" target="_blank">
                <i class="fab fa-youtube" style="color: var(--yt-color);"></i>
                <div class="card-info">
                    <span class="card-title">YouTube</span>
                    <span class="card-subtitle">ARCH1GMS • Стримы</span>
                </div>
            </a>

            <a href="https://www.tiktok.com/@arch1gms" class="card tiktok" target="_blank">
                <i class="fab fa-tiktok" style="color: var(--tt-color);"></i>
                <div class="card-info">
                    <span class="card-title">TikTok</span>
                    <span class="card-subtitle">ARCH1GMS • Highlights</span>
                </div>
            </a>

            <a href="https://www.twitch.tv/arch1gms" class="card twitch" target="_blank">
                <i class="fab fa-twitch" style="color: var(--tw-color);"></i>
                <div class="card-info">
                    <span class="card-title">Twitch</span>
                    <span class="card-subtitle">ARCH1GMS • Live</span>
                </div>
            </a>

            <a href="https://destream.net/live/ARCHIGAMES/donate" class="card donate" target="_blank">
                <i class="fas fa-wallet" style="color: var(--ds-color);"></i>
                <div class="card-info">
                    <span class="card-title">Support</span>
                    <span class="card-subtitle">Донат для поддержки</span>
                </div>
            </a>
        </div>

        <footer>
            &copy; 2026 ARCHI GAMES
        </footer>
    </div>
</body>
</html>
