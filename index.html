<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHI GAMES | На модернизации</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #06070b;
            --bg-2: #0b1020;
            --accent: #3b82f6;
            --accent-2: #8b5cf6;
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.72);
            --line: rgba(255, 255, 255, 0.1);
            --glass: rgba(255, 255, 255, 0.06);
            --glass-strong: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 15% 20%, rgba(59, 130, 246, 0.22), transparent 30%),
                radial-gradient(circle at 85% 75%, rgba(139, 92, 246, 0.18), transparent 28%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .noise,
        .grid,
        .glow {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        .grid {
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black 45%, transparent 90%);
        }

        .glow::before,
        .glow::after {
            content: "";
            position: absolute;
            width: 380px;
            height: 380px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.28;
        }

        .glow::before {
            top: -80px;
            left: -90px;
            background: var(--accent);
        }

        .glow::after {
            right: -90px;
            bottom: -80px;
            background: var(--accent-2);
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        .panel {
            position: relative;
            background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
            border: 1px solid var(--line);
            border-radius: 28px;
            padding: 34px 26px;
            text-align: center;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .panel::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent 35%, transparent 65%, rgba(255,255,255,0.04));
            pointer-events: none;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            margin-bottom: 22px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #dbeafe;
            font-size: 0.88rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .badge-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #60a5fa;
            box-shadow: 0 0 16px #60a5fa;
            animation: pulse 1.8s infinite ease-in-out;
        }

        h1 {
            margin: 0 0 14px;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 7vw, 3rem);
            font-weight: 800;
            letter-spacing: 3px;
            line-height: 1.05;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.25);
        }

        .headline {
            margin: 0 0 16px;
            font-size: clamp(1rem, 3vw, 1.15rem);
            font-weight: 700;
            color: #e5edff;
        }

        .description {
            margin: 0 auto;
            max-width: 420px;
            font-size: 0.98rem;
            line-height: 1.7;
            color: var(--muted);
        }

        .divider {
            width: 90px;
            height: 1px;
            margin: 28px auto 24px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
        }

        .status-box {
            display: grid;
            gap: 12px;
            margin-top: 8px;
            padding: 18px;
            border-radius: 20px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .status-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #ffffff;
        }

        .status-text {
            font-size: 0.92rem;
            line-height: 1.6;
            color: rgba(255,255,255,0.68);
        }

        footer {
            margin-top: 22px;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.42);
            letter-spacing: 1.4px;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.25);
                opacity: 0.75;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 18px;
            }

            .panel {
                padding: 28px 20px;
                border-radius: 24px;
            }

            .description {
                font-size: 0.94rem;
            }
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="grid"></div>

    <main class="container">
        <section class="panel">
            <div class="badge">
                <span class="badge-dot"></span>
                Временное техническое обновление
            </div>

            <h1>ARCHI GAMES</h1>

            <p class="headline">Страница сейчас на модернизации</p>

            <p class="description">
                Мы обновляем сайт, чтобы сделать его быстрее, удобнее и современнее.
                Совсем скоро страница снова будет доступна.
            </p>

            <div class="divider"></div>

            <div class="status-box">
                <div class="status-title">Сайт скоро вернётся в онлайн</div>
                <div class="status-text">
                    Спасибо за понимание и терпение. Загляните немного позже.
                </div>
            </div>

            <footer>
                &copy; 2026 ARCHI GAMES
            </footer>
        </section>
    </main>
</body>
</html>
